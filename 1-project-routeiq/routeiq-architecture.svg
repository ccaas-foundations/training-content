<svg width="680" height="390" viewBox="0 0 680 390" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!--
    LAYOUT
    call-routing cx=200, agent cx=480, midpoint=340
    ROW 1 (y=20):  Artemis console x=20  w=130 cx=85
    ROW 2 (y=130): ActiveMQ Artemis x=20 w=194 cx=117   Eureka x=240 w=200 cx=340
    ROW 3 (y=240): call-routing-service x=100 w=200 cx=200   agent-service x=380 w=200 cx=480
    ROW 4 (y=350): H2 routing x=100 w=200 cx=200              H2 agent x=380 w=200 cx=480
  -->

  <!-- ROW 1: Artemis console -->
  <rect x="20" y="20" width="130" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="85" y="41" text-anchor="middle" font-size="13" font-weight="bold" fill="#444441">Artemis console</text>
  <text x="85" y="59" text-anchor="middle" font-size="11" fill="#5F5E5A">localhost:8161</text>

  <!-- ROW 2 LEFT: ActiveMQ Artemis -->
  <rect x="20" y="130" width="194" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="117" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="#633806">ActiveMQ Artemis</text>
  <text x="117" y="169" text-anchor="middle" font-size="11" fill="#854F0B">call.routing.queue  :61616</text>

  <!-- ROW 2 RIGHT: Eureka centered over services (cx=340) -->
  <rect x="240" y="130" width="200" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="#444441">Eureka</text>
  <text x="340" y="169" text-anchor="middle" font-size="11" fill="#5F5E5A">discovery-service  :8761</text>

  <!-- ROW 3 LEFT: call-routing-service cx=200 -->
  <rect x="100" y="240" width="200" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="200" y="261" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">call-routing-service</text>
  <text x="200" y="277" text-anchor="middle" font-size="11" fill="#534AB7">Spring Boot JPA</text>
  <text x="200" y="291" text-anchor="middle" font-size="10" fill="#534AB7">:8082</text>

  <!-- ROW 3 RIGHT: agent-service cx=480 -->
  <rect x="380" y="240" width="200" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="480" y="261" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">agent-service</text>
  <text x="480" y="277" text-anchor="middle" font-size="11" fill="#0F6E56">Spring Boot JPA</text>
  <text x="480" y="291" text-anchor="middle" font-size="10" fill="#0F6E56">:8081</text>

  <!-- ROW 4 LEFT: H2 routing -->
  <rect x="100" y="350" width="200" height="28" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="200" y="369" text-anchor="middle" font-size="12" fill="#444441">H2  —  call data</text>

  <!-- ROW 4 RIGHT: H2 agent -->
  <rect x="380" y="350" width="200" height="28" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="480" y="369" text-anchor="middle" font-size="12" fill="#444441">H2  —  agent data</text>

  <!-- ARROWS -->

  <!-- console → Artemis (straight down) -->
  <line x1="85" y1="72" x2="85" y2="130" stroke="#BA7517" stroke-width="1.5" marker-end="url(#aa)"/>

  <!-- Artemis → call-routing (straight down, right offset) -->
  <line x1="130" y1="182" x2="188" y2="240" stroke="#534AB7" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- call-routing → Artemis (subscribe, left offset) -->
  <line x1="172" y1="240" x2="117" y2="182" stroke="#534AB7" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- Eureka registration — dotted lines, no arrows, from each service top -->
  <line x1="270" y1="182" x2="220" y2="240" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="410" y1="182" x2="460" y2="240" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- call-routing → agent (solid, top channel) -->
  <line x1="300" y1="258" x2="380" y2="258" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#at)"/>

  <!-- agent → call-routing (solid, bottom channel) -->
  <line x1="380" y1="274" x2="300" y2="274" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#at)"/>

  <!-- call-routing → H2 routing (straight down) -->
  <line x1="200" y1="298" x2="200" y2="350" stroke="#534AB7" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- agent → H2 agent (straight down) -->
  <line x1="480" y1="298" x2="480" y2="350" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#at)"/>

</svg>
